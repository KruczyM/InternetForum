<!DOCTYPE html>
<html lang="en">

<head>
    <title>Register · Book Forum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/auth.css"></title>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>BOOK FORUM</h1>
            <p class="subtitle">Create your reading account</p>

            <form action="/auth/register" method="POST">

                <div class="input-group">
                    <input type="text" name="username" placeholder=" " required>
                    <span class="floating-text">USERNAME</span>
                </div>

                <div class="input-group">
                    <input type="text" name="first_name" placeholder=" " required>
                    <span class="floating-text">FIRST NAME</span>
                </div>

                <div class="input-group">
                    <input type="text" name="last_name" placeholder=" " required>
                    <span class="floating-text">LAST NAME</span>
                </div>

                <div class="input-group">
                    <input type="email" name="email" placeholder=" " required>
                    <span class="floating-text">EMAIL</span>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder=" " required>
                    <span class="floating-text">PASSWORD</span>
                </div>

                <button type="submit">Create account</button>
            </form>

            <a class="back-link" href="/">Back to Home</a>
        </div>
    </div>
</body>

</html>
