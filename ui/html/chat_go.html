{{define "chat"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Chat (Go Only)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        #chat-box { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 1em; margin-bottom: 1em; background: #fafafa; }
        form { display: flex; gap: 0.5em; }
        form input, form select { padding: 0.5em; }
        .chat-message { margin-bottom: 0.5em; }
        .chat-meta { color: #888; font-size: 0.9em; }
    </style>
    <meta http-equiv="refresh" content="5">
</head>
<body>
    <h2>Book Chat (Go Only)</h2>
    <form method="GET" action="/chat/go">
        <label for="category">Category:</label>
        <select name="category" id="category" onchange="this.form.submit()">
            {{range .Categories}}
                <option value="{{.}}" {{if eq $.CurrentCategory .}}selected{{end}}>{{.}}</option>
            {{end}}
        </select>
        <noscript><button type="submit">Load</button></noscript>
    </form>
    <div id="chat-box">
        {{range .Messages}}
            <div class="chat-message">
                <span class="chat-meta">[{{.UserID}}] ({{.CreatedAt.Format "15:04:05"}}):</span> {{.Content}}
            </div>
        {{else}}
            <div class="chat-message">No messages yet.</div>
        {{end}}
    </div>
    <form method="POST" action="/chat/go">
        <input type="hidden" name="category" value="{{.CurrentCategory}}">
        <input type="text" name="user_id" placeholder="User ID" required style="width: 8em;">
        <input type="text" name="content" placeholder="Type a message..." required style="flex:1;">
        <button type="submit">Send</button>
    </form>
</body>
</html>
{{end}}
