<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Post – Book Forum</title>
  <link rel="stylesheet" href="/static/main.css">
</head>
<body>

<div class="forum-shell">

  <!-- Header -->
  <header class="forum-header">
    <div class="header-left">
      <div class="logo">BOOK FORUM</div>
      <nav class="main-nav">
        <a href="/" class="nav-link">Posts</a>
        <a href="#" class="nav-link">Chat</a>
        <a href="/profile" class="nav-link">My Profile</a>
      </nav>
    </div>

    <div class="header-tools">
      <form action="/" method="GET" class="search-box header-search">
        <input type="text" name="q" placeholder="Search...">
      </form>
    </div>

    <div class="auth-links">
      {{if .IsAuthenticated}}
        <form action="/auth/logout" method="POST">
          <button class="text-btn">Logout</button>
        </form>
      {{else}}
        <a href="/auth/register">Register</a>
        <a href="/auth/login">Login</a>
      {{end}}
    </div>
  </header>

  <!-- Content -->
  <main class="center-panel">
    <div class="create-post-form-container">

      <h1>Create a New Post</h1>

      <form
        action="/post/create"
        method="POST"
        enctype="multipart/form-data"
        class="create-post-form"
      >

        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" required>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select name="post_type" required>
            <option value="Classics">Classics</option>
            <option value="General_Fiction">General Fiction</option>
            <option value="Crime_Mystery_Thriller">Crime / Thriller</option>
            <option value="Womens_Fiction">Women's Fiction</option>
            <option value="Childrens">Children's</option>
            <option value="Poetry_Plays">Poetry / Plays</option>
            <option value="Non_Fiction">Non-Fiction</option>
            <option value="Historical_Fiction">Historical Fiction</option>
          </select>
        </div>

        <div class="form-group">
          <label>Related Book</label>
          <select name="book_id">
            <option value="0">No Specific Book</option>
            {{range .Books}}
              <option value="{{.ID}}">{{.Title}}</option>
            {{end}}
          </select>
        </div>

        <div class="form-group">
          <label>Chapter</label>
          <input type="text" name="chapter" placeholder="e.g. Chapter 4">
        </div>
<div class="form-group file-upload-group">
  <label for="image">Upload Image (optional)</label>
  <input
    type="file"
    id="image"
    name="image"
    accept="image/jpeg,image/png,image/gif"
  >
</div>

        <div class="form-group">
          <label>Content</label>
          <textarea name="content" rows="6" required></textarea>
        </div>

        <button type="submit" class="primary-btn">Post</button>

      </form>
    </div>
  </main>

</div>

</body>
</html>
