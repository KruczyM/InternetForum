<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home – Book Forum</title>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>

<div class="forum-shell">

    <!-- Header -->
    <header class="forum-header">

     <div class="header-left">
      <div class="logo">BOOK FORUM</div>
      <nav class="main-nav">
          <a href="/" class="nav-link">Posts</a>
          <a href="#" class="nav-link">Chat</a>
           <a href="/profile" class="nav-link">My Profile</a>
      </nav>
  </div>

 <div class="header-tools">
      <div class="nav-dropdown">
          <button class="nav-link dropdown-toggle" type="button">
              Categories ▾
          </button>
          <div class="dropdown-menu">
              <a href="/">All</a>
              <a href="/?category=Classics">Classics</a>
              <a href="/?category=General_Fiction">General Fiction</a>
              <a href="/?category=Crime_Mystery_Thriller">Crime / Thriller</a>
              <a href="/?category=Womens_Fiction">Women's Fiction</a>
              <a href="/?category=Childrens">Children's</a>
              <a href="/?category=Poetry_Plays">Poetry / Plays</a>
              <a href="/?category=Non_Fiction">Non-Fiction</a>
              <a href="/?category=Historical_Fiction">Historical Fiction</a>
          </div>
      </div>
      <form action="/" method="GET" class="search-box header-search">
          <input type="text" name="q" placeholder="Search...">
      </form>
  </div>

    <div class="auth-links">
      {{if .IsAuthenticated}}
          <form action="/auth/logout" method="POST">
              <button class="text-btn">Logout</button>
          </form>
      {{else}}
          <a href="/auth/register">Register</a>
          <a href="/auth/login">Login</a>
      {{end}}
  </div>

</header>

        <!-- Center -->
        <main class="center-panel">
        <div class="create-post-form-container">
            <h1>Create a New Post</h1>
            <form action="/post/create" method="POST" class="create-post-form">

                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" name="title" required>
                </div>

                <div class="form-group">
                    <label>Category:</label>
                    <select name="post_type" required>
                        <option value="Classics">Classics</option>
                        <option value="General_Fiction">General Fiction</option>
                        <option value="Crime_Thriller">Crime / Thriller</option>
                        <option value="Womens_Fiction">Women's Fiction</option>
                        <option value="Childrens">Children's</option>
                        <option value="Poetry_Plays">Poetry / Plays</option>
                        <option value="Non_Fiction">Non-Fiction</option>
                        <option value="Historical_Fiction">Historical Fiction</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Related Book:</label>
                    <select name="book_id">
                        <option value="0">No Specific Book</option>
                        {{range .Books}}
                        <option value="{{.ID}}">{{.Title}}</option>
                        {{end}}
                    </select>
                </div>

                <div class="form-group">
                    <label>Chapter:</label>
                    <input type="text" name="chapter" placeholder="e.g. Chapter 4">
                </div>

                <div class="form-group">
                    <label>Content:</label>
                    <textarea name="content" required></textarea>
                </div>

                <input type="hidden" name="user_id" value="1">
                <button type="submit" class="primary-btn">Post</button>
            </form>
        </div>
    </main>
    
</div>

</body>
</html>
