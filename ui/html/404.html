<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Page not found · Book Forum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/main.css">
    <link rel="stylesheet" href="/static/404.css">
</head>

<body>

    <div class="forum-shell">
        <!-- Header -->
        <header class="forum-header">
            <div class="header-left">
                <div class="logo"><a href="/" class="clean-link">BOOK FORUM</a></div>
                <nav class="main-nav">
                    <a href="/" class="nav-link">Posts</a>
                    {{if .IsAuthenticated}}
                    <a href="/chat/" class="nav-link">Chat</a>
                    <div class="nav-dropdown">
                        <button class="nav-link dropdown-toggle" type="button">
                            My Account ▾
                        </button>
                        <div class="dropdown-menu">
                            <a href="/profile?tab=profile">Profile</a>
                            <a href="/profile?tab=posts">My Posts</a>
                            <a href="/profile?tab=comments">My Comments</a>
                            <a href="/profile?tab=likes">My Likes</a>
                        </div>
                    </div>
                    {{end}}
                </nav>
            </div>
            <div class="auth-links">
                {{if .IsAuthenticated}}
                <form action="/auth/logout" method="POST">
                    <button class="text-btn">Logout</button>
                </form>
                {{else}}
                <a href="/auth/register">Register</a>
                <a href="/auth/login">Login</a>
                {{end}}
            </div>
        </header>
    </div>

    <!-- Content -->
    <main class="center-panel">

        <div class="notfound-container">
            <h1 class="notfound-code">404</h1>
            <h2 class="notfound-title">Page not found</h2>

            <p class="notfound-text">
                The page you’re looking for doesn’t exist,
                or it may have been moved.
            </p>

            <div class="notfound-actions">
                <a href="/" class="primary-btn">← Back to posts</a>
            </div>
        </div>

    </main>
    </div>

</body>

</html>
