<!DOCTYPE html>
<html lang="en">

<head>
  <title>Login · Book Forum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1><a href="/" class="clean-link">BOOK FORUM</a></h1>
      <p class="subtitle">Welcome back to your reading space</p>
      {{ with .Flash }}
      <p class="{{ .Type }}">{{ .Msg | safeHTML }}</p>
      {{ end }}
      <form action="/auth/login" method="POST" novalidate>
        <div class="field">
          {{with .Form.FieldErrors.email}}
          <div class="error">{{.}}</div>
          {{end}}
          <div class="input-group">
            <input type="email" name="email" placeholder=" " />
            <span class="floating-text">EMAIL</span>
          </div>
        </div>
        <div class="field">
          {{with .Form.FieldErrors.password}}
          <div class="error">{{.}}</div>
          {{end}}
          <div class="input-group">
            <input type="password" name="password" placeholder=" " />
            <span class="floating-text">PASSWORD</span>
          </div>
        </div>
        <button type="submit">Log in</button>
      </form>
      <div class="auth-links">
        <a href="/" class="link-muted">Back to Home</a>
        <a href="/auth/register" class="link-accent">Register</a>
      </div>

    </div>
  </div>
</body>

</html>
