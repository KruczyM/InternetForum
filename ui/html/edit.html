<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Create Post</title>
    </head>
    <body>
        <h1>Create a New Post</h1>
        <form action="/post/{{.Post.Post.ID}}/edit" method="POST">
            <div>
                <label>Title:</label><br>
                <input type="text" name="title" value="{{.Post.Post.Title}}" required>
            </div>
            <div>
                <label>Content:</label><br>
                <textarea name="content" required>{{.Post.Post.Content}}</textarea>
            </div>
            <input type="hidden" name="user_id" value="1"><br>
            <button type="submit">Update Post</button>
        </form>
        <br>
        <a href="/post/{{.Post.Post.ID}}">Back to Post</a>
    </body>
</html>
