<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Home – Book Forum</title>
    <link rel="stylesheet" href="/static/main.css">
  </head>
  <body>
    <div class="forum-shell">
    <!-- Header -->
    <header class="forum-header">
      <div class="header-left">
        <div class="logo">BOOK FORUM</div>
        <nav class="main-nav">
          <a href="/" class="nav-link">Posts</a>
          <a href="/chat/" class="nav-link">Chat</a>
          <div class="nav-dropdown">
            <button class="nav-link dropdown-toggle" type="button">
              My Account ▾
            </button>
            <div class="dropdown-menu">
              <a href="/profile?tab=profile">Profile</a>
              <a href="/profile?tab=posts">My Posts</a>
              <a href="/profile?tab=comments">My Comments</a>
              <a href="/profile?tab=likes">My Likes</a>
            </div>
          </div>
        </nav>
      </div>


        <div class="header-tools">
          <div class="nav-dropdown">
            <button class="nav-link dropdown-toggle" type="button"> Categories ▾ </button>
            <div class="dropdown-menu">
              <a href="/">All</a>
              <a href="/?category=Classics">Classics</a>
              <a href="/?category=General_Fiction">General Fiction</a>
              <a href="/?category=Crime_Mystery_Thriller">Crime / Thriller</a>
              <a href="/?category=Womens_Fiction">Women's Fiction</a>
              <a href="/?category=Childrens">Children's</a>
              <a href="/?category=Poetry_Plays">Poetry / Plays</a>
              <a href="/?category=Non_Fiction">Non-Fiction</a>
              <a href="/?category=Historical_Fiction">Historical Fiction</a>
            </div>
          </div>
          <form action="/" method="GET" class="search-box header-search">
            <input type="text" name="q" placeholder="Search...">
          </form>
        </div>
        <div class="auth-links">
          {{if .IsAuthenticated}}
          <form action="/auth/logout" method="POST">
            <button class="text-btn">Logout</button>
          </form>
          {{else}}
            <a href="/auth/register">Register</a>
            <a href="/auth/login">Login</a>
            {{end}}
        </div>
      </header>
      <!-- Center -->
      <main class="center-panel">
        <div class="create-post-form-container">
          <h1>Edit Post</h1>
          <form action="/post/{{.Post.Post.ID}}/edit" method="POST" class="create-post-form">
            <div class="form-group">
              <label>Title:</label>
              <input type="text" name="title" value="{{.Post.Post.Title}}" required>
            </div>
            <div class="form-group">
              <label>Content:</label>
              <textarea name="content" required>{{.Post.Post.Content}}</textarea>
            </div>
            <input type="hidden" name="user_id" value="1">
            <button type="submit" class="primary-btn"> Update Post </button>
          </form>
        </div>
      </main>
    </div>
  </body>
</html>
