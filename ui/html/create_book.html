<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add a Book</title>
</head>
<body>
    <div>
        <a href="/post/create">← Back to Create Post</a>
        
        <h1>Add a New Book</h1>
        <p>Can't find the book you are looking for? Add it here.</p>

        {{if .Flash}}
            <div>
                {{.Flash}}
            </div>
        {{end}}

        <form action="/book/create" method="POST">
            <div>
                <label>Book Title:</label><br>
                <input type="text" name="title" required placeholder="e.g. The Great Gatsby">
            </div>
            
            <div>
                <label>Author:</label><br>
                <input type="text" name="author" required placeholder="e.g. F. Scott Fitzgerald">
            </div>

            <div>
                <label>Description (Optional):</label><br>
                <textarea name="description" rows="5"></textarea>
            </div>

            <button type="submit" >Add Book</button>
        </form>
    </div>
</body>
</html>
